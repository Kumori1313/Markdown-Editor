<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toolbar">
    <label for="font-select">Font:</label>
    <select id="font-select">
      <option value="sans">Sans-Serif</option>
      <option value="serif">Serif</option>
      <option value="mono">Monospace</option>
    </select>
    <span id="mode-badge">RAW</span>
    <span id="file-name">No file open</span>
  </div>

  <textarea id="editor" spellcheck="false" placeholder="Open a file to begin editing…"></textarea>
  <div id="preview" style="display:none"></div>

  <div id="status-bar">
    <span id="file-type-label">—</span>
    <select id="encoding-select">
      <option value="UTF-8">UTF-8</option>
      <option value="ASCII">ASCII</option>
      <option value="ISO-8859-1">ISO-8859-1</option>
      <option value="windows-1252">Windows-1252</option>
      <option value="Shift_JIS">Shift_JIS</option>
      <option value="EUC-JP">EUC-JP</option>
      <option value="GB2312">GB2312</option>
      <option value="Big5">Big5</option>
      <option value="EUC-KR">EUC-KR</option>
      <option value="UTF-16LE">UTF-16LE</option>
      <option value="UTF-16BE">UTF-16BE</option>
    </select>
    <select id="line-ending-select">
      <option value="LF">LF</option>
      <option value="CRLF">CRLF</option>
      <option value="CR">CR</option>
    </select>
    <span id="modified-label"></span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
